version: "3.9"
services:
 app:
   build: .
   container_name: its-node-demo
   ports:
     - "8181:3000"
   environment:
     SMTP_HOST: mailhog
     SMTP_PORT: 1025
   depends_on:
     - mailhog
   restart: unless-stopped
 mailhog:
   image: mailhog/mailhog
   container_name: mailhog
   ports:
     - "8025:8025"
     - "1025:1025"
   restart: unless-stopped